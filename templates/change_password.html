{% extends "base.html" %}

{% block content %}
<h1>Change Password</h1>

<div class="card" style="max-width: 500px; margin: 0 auto;">
    {% if message %}
        <div class="success-message">{{ message }}</div>
    {% endif %}

    <form method="POST">
        <div style="margin-bottom: 12px;">
            <label>Current Password</label><br>
            <input name="current_password" type="password" style="width: 100%; padding: 8px;">
        </div>

        <div style="margin-bottom: 12px;">
            <label>New Password</label><br>
            <input name="new_password" type="password" style="width: 100%; padding: 8px;">
        </div>

        <div style="margin-bottom: 16px;">
            <label>Confirm Password</label><br>
            <input name="confirm_password" type="password" style="width: 100%; padding: 8px;">
        </div>

        <button type="submit">Change Password</button>
    </form>
</div>
{% endblock %}
